name: Feature request
description: Suggest an improvement or new capability.
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: A clear description of the pain point or use case.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would help?
      description: Your preferred solution or outcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other approaches or workarounds you explored.
  - type: textarea
    id: context
    attributes:
      label: Anything else we should know?
      description: Mockups, related issues, links, or extra context.
